services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sgscms
      POSTGRES_PASSWORD: sgscms
      POSTGRES_DB: sgscms
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgscms"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build: .
    depends_on:
      postgres: {condition: service_healthy}
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://sgscms:sgscms@postgres:5432/sgscms?sslmode=disable
      SESSION_SECURE: "false"
      PUBLIC_BASE_URL: http://localhost:8080
      BOOTSTRAP_ADMIN_EMAIL: admin@example.com
      BOOTSTRAP_ADMIN_PASSWORD: change-me-now
    ports: ["8080:8080"]
    volumes: ["media_data:/app/var/media"]
volumes:
  postgres_data:
  media_data:
