services:
  postgres:
    image: postgres:17-alpine
    container_name: sgscms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sgscms
      POSTGRES_USER: sgscms
      POSTGRES_PASSWORD: sgscms_secret
    ports:
      - "5432:5432"
    volumes:
      - sgscms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgscms -d sgscms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sgscms_postgres_data:
