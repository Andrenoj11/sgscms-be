  dto.SwaggerErrorResponse:
    properties:
      errors: {}
      message:
        example: Invalid request
        type: string
      success:
        example: false
        type: boolean
    type: object
  dto.SwaggerPaginatedResponse:
    properties:
      data: {}
      message:
        example: Data retrieved successfully
        type: string
      meta:
        $ref: '#/definitions/dto.SwaggerPaginationMeta'
      success:
        example: true
        type: boolean
    type: object
  dto.SwaggerPaginationMeta:
    properties:
      limit:
        example: 10
        type: integer
      page:
        example: 1
        type: integer
      total:
        example: 25
        type: integer
      total_pages:
        example: 3
        type: integer
    type: object
  dto.SwaggerSuccessResponse:
    properties:
      data: {}
      message:
        example: Request successful
        type: string
      success:
        example: true
        type: boolean
    type: object
  dto.TeamResponse:
    properties:
      biography:
        type: string
      created_at:
        type: string
      degree:
        type: string
      display_order:
        type: integer
      email:
        type: string
      id:
        type: string
      is_published:
        type: boolean
      linkedin_url:
        type: string
      name:
        type: string
      photo_url:
        type: string
      position:
        type: string
      practice_areas:
        items:
          $ref: '#/definitions/dto.PracticeAreaResponse'
        type: array
      published_at:
        type: string
      short_description:
        type: string
      slug:
        type: string
      updated_at:
        type: string
    type: object
  dto.UpdateNewsRequest:
    properties:
      content:
        maxLength: 100000
        minLength: 10
        type: string
      excerpt:
        maxLength: 1000
        type: string
      featured_image_url:
        maxLength: 2000
        type: string
      is_featured:
        type: boolean
      status:
        enum:
        - draft
        - published
        - archived
