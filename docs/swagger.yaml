        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      - XSignature: []
      - XTimestamp: []
      - XNonce: []
      summary: Menghapus news
      tags:
      - Admin News
    get:
      parameters:
      - description: News UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.SwaggerSuccessResponse'
