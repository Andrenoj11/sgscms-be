basePath: /api/v1
definitions:
  dto.AdminResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
  dto.CreateNewsRequest:
    properties:
      content:
        maxLength: 100000
        minLength: 10
        type: string
      excerpt:
        maxLength: 1000
        type: string
      featured_image_url:
        maxLength: 2000
        type: string
      is_featured:
        type: boolean
      status:
        enum:
        - draft
        - published
        - archived
        type: string
      title:
        maxLength: 255
        minLength: 3
        type: string
    required:
    - content
    - status
    - title
    type: object
  dto.CreatePracticeAreaRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      display_order:
        minimum: 0
        type: integer
      is_active:
        type: boolean
      name:
        maxLength: 150
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.CreateTeamRequest:
    properties:
      biography:
        maxLength: 20000
        type: string
      degree:
        maxLength: 100
        type: string
      display_order:
        minimum: 0
        type: integer
      email:
        maxLength: 150
        type: string
      is_published:
        type: boolean
      linkedin_url:
        maxLength: 2000
        type: string
      name:
        maxLength: 150
        minLength: 2
        type: string
      photo_url:
        maxLength: 2000
        type: string
      position:
        maxLength: 150
        minLength: 2
        type: string
      practice_area_ids:
        items:
          type: string
        type: array
      short_description:
        maxLength: 1000
        type: string
    required:
    - name
    - position
    type: object
  dto.LoginRequest:
    properties:
      email:
        maxLength: 150
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        type: string
      admin:
        $ref: '#/definitions/dto.AdminResponse'
      expires_in:
        type: integer
      signing_key:
        type: string
      token_type:
        type: string
    type: object
  dto.NewsResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      excerpt:
        type: string
      featured_image_url:
        type: string
      id:
        type: string
      is_featured:
        type: boolean
      published_at:
        type: string
      slug:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  dto.PracticeAreaResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      display_order:
        type: integer
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      slug:
        type: string
      updated_at:
        type: string
    type: object
  dto.PublicNewsDetailResponse:
    properties:
      content:
        type: string
      excerpt:
        type: string
      featured_image_url:
        type: string
      id:
        type: string
      is_featured:
        type: boolean
      published_at:
        type: string
      slug:
        type: string
      title:
        type: string
    type: object
  dto.PublicNewsListResponse:
    properties:
      excerpt:
        type: string
      featured_image_url:
        type: string
      id:
        type: string
      is_featured:
        type: boolean
      published_at:
        type: string
      slug:
        type: string
      title:
        type: string
    type: object
  dto.PublicPracticeAreaResponse:
    properties:
      description:
        type: string
      display_order:
        type: integer
      id:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
  dto.PublicTeamDetailResponse:
    properties:
      biography:
        type: string
      degree:
        type: string
      display_order:
        type: integer
      email:
        type: string
      id:
        type: string
      linkedin_url:
        type: string
      name:
        type: string
      photo_url:
        type: string
      position:
        type: string
      practice_areas:
        items:
          $ref: '#/definitions/dto.PublicPracticeAreaResponse'
        type: array
      published_at:
        type: string
      short_description:
        type: string
      slug:
        type: string
    type: object
  dto.PublicTeamListResponse:
    properties:
      degree:
        type: string
      display_order:
        type: integer
      id:
        type: string
      name:
        type: string
      photo_url:
        type: string
      position:
        type: string
      practice_areas:
        items:
          $ref: '#/definitions/dto.PublicPracticeAreaResponse'
