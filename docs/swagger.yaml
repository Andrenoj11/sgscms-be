      title:
        maxLength: 255
        minLength: 3
        type: string
    required:
    - content
    - status
    - title
    type: object
  dto.UpdatePracticeAreaRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      display_order:
        minimum: 0
        type: integer
      is_active:
        type: boolean
      name:
        maxLength: 150
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.UpdateTeamRequest:
    properties:
      biography:
        maxLength: 20000
        type: string
      degree:
        maxLength: 100
        type: string
      display_order:
        minimum: 0
        type: integer
      email:
        maxLength: 150
        type: string
      is_published:
        type: boolean
      linkedin_url:
        maxLength: 2000
        type: string
      name:
        maxLength: 150
        minLength: 2
        type: string
      photo_url:
        maxLength: 2000
        type: string
      position:
        maxLength: 150
        minLength: 2
        type: string
      practice_area_ids:
        items:
          type: string
        type: array
      short_description:
        maxLength: 1000
        type: string
    required:
    - name
    - position
    type: object
  dto.UploadImageResponse:
    properties:
      category:
        type: string
      content_type:
        type: string
      filename:
        type: string
      height:
        type: integer
      original_name:
        type: string
      path:
        type: string
      size:
        type: integer
      url:
        type: string
      width:
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    name: SGS CMS Development Team
  description: |-
    Backend CMS API untuk SGS Law Firm.

    Admin API menggunakan JWT Bearer Token.
    Sebagian besar admin endpoint juga membutuhkan X-Timestamp, X-Nonce, dan X-Signature.
    Upload gambar hanya membutuhkan JWT karena menggunakan multipart/form-data.

    Format canonical X-Signature:
    METHOD + newline + REQUEST_URI + newline + TIMESTAMP + newline + NONCE + newline + SHA256_BODY
  license:
    name: Private
  title: SGS CMS API
  version: "1.0"
paths:
  /admin/auth/login:
    post:
      consumes:
      - application/json
      description: Melakukan autentikasi admin dan membuat access token, refresh cookie,
        serta signing key.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.SwaggerSuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
      summary: Login admin
      tags:
      - Admin Authentication
  /admin/auth/logout:
    post:
      description: Mencabut admin session dan menghapus refresh-token cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SwaggerSuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
      summary: Logout admin
      tags:
      - Admin Authentication
  /admin/auth/me:
    get:
      description: Mengembalikan profil admin dari access token aktif.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.SwaggerSuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.AdminResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      - XSignature: []
      - XTimestamp: []
      - XNonce: []
      summary: Mendapatkan admin saat ini
      tags:
      - Admin Authentication
  /admin/auth/refresh:
    post:
      description: Membuat access token dan signing key baru menggunakan HttpOnly
        refresh-token cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.SwaggerSuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.RefreshResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
      summary: Refresh access token
      tags:
      - Admin Authentication
  /admin/news:
    get:
      parameters:
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 10
        description: Limit
        in: query
        maximum: 100
        name: limit
        type: integer
      - description: Search
        in: query
        name: search
        type: string
      - description: Status
        enum:
        - draft
        - published
        - archived
        in: query
        name: status
        type: string
      - description: Featured filter
        in: query
        name: is_featured
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.SwaggerPaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.NewsResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      - XSignature: []
      - XTimestamp: []
      - XNonce: []
      summary: Daftar news admin
      tags:
      - Admin News
    post:
      consumes:
      - application/json
      parameters:
      - description: News data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateNewsRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.SwaggerSuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.NewsResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      - XSignature: []
      - XTimestamp: []
      - XNonce: []
      summary: Membuat news
      tags:
      - Admin News
  /admin/news/{id}:
